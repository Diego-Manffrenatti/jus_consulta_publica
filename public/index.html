<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Consulta Pública de Processos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Consulta de Processos por CNPJ</h1>

<div class="controls">
    <button id="btnSelectAll">Selecionar todos</button>
    <button id="btnDeselectAll">Desselecionar todos</button>
</div>

<ul id="cnpjCheckboxes" class="scroll-list"></ul>

<div class="controls">
    <button id="btnConsulta">Buscar processos</button>
    <button id="btnDownload" disabled>Exportar para Excel</button>
</div>

<div id="alerts"></div>

<div id="loading" class="hidden">
    <div class="spinner"></div>
    <p id="progress">Aguardando…</p>
</div>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="app.js"></script>
</body>
</html>
